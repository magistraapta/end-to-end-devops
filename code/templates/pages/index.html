{{ define "pages/index.html" }}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Users CRUD</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    h1, h2 { margin-bottom: 0.75rem; }
    form { display: grid; gap: 0.5rem; max-width: 420px; margin-bottom: 1.5rem; }
    input, button { padding: 0.55rem; font-size: 0.95rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ddd; padding: 0.55rem; text-align: left; }
    .actions { display: flex; gap: 0.5rem; }
    #edit-form { margin: 1.25rem 0; }
  </style>
</head>
<body>
  <h1>Users</h1>

  <h2>Create User</h2>
  <form
    hx-post="/users"
    hx-target="#users-table"
    hx-swap="outerHTML"
    hx-on::after-request="if(event.detail.successful) this.reset()"
  >
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Create</button>
  </form>

  <div id="edit-form"></div>

  {{ template "partials/users_table.html" . }}
</body>
</html>
{{ end }}
